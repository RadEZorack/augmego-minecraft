name: Deploy To DigitalOcean

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-digitalocean.yml"
      - "compose.droplet.yaml"
      - "Caddyfile"
      - "core/**"
      - "minecraft/**"
      - "nginx/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Copy project to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT || '22' }}
          source: "."
          target: "/opt/augmego-minecraft/app"
          overwrite: true

      - name: Restart stack on droplet
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DO_PORT || '22' }}
          script_stop: true
          script: |
            mkdir -p /opt/augmego-minecraft/env
            mkdir -p /opt/augmego-minecraft/minecraft/data
            mkdir -p /opt/augmego-minecraft/minecraft/mods
            mkdir -p /opt/augmego-minecraft/minecraft/config

            cd /opt/augmego-minecraft/app

            set -a
            . /opt/augmego-minecraft/env/minecraft.env
            set +a

            docker compose -f compose.droplet.yaml up -d --remove-orphans
            docker compose -f compose.droplet.yaml ps
